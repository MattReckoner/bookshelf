<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d0d1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Biblioteka">
  <title>Moja Biblioteka</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/umd/index.min.js"></script>
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d0d1a;
      --surface:     #161628;
      --surface2:    #1e1e35;
      --surface3:    #252542;
      --border:      #2a2a48;
      --text:        #e8e8f5;
      --text2:       #7878a8;
      --accent:      #7c6af7;
      --accent-lt:   #a594ff;
      --accent-glow: rgba(124,106,247,.35);
      --reading:     #f59e0b;
      --read:        #10b981;
      --want:        #3b82f6;
      --danger:      #ef4444;
      --star:        #f59e0b;
      --r:           12px;
      --r-sm:        8px;
    }

    html { height: 100%; }
    body {
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }

    button { font-family: inherit; }

    /* ===== OFFLINE BANNER ===== */
    #offlineBanner {
      background: var(--danger);
      color: #fff;
      text-align: center;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      display: none;
    }
    #offlineBanner.show { display: block; }

    /* ===== APP WRAPPER ===== */
    #app {
      max-width: 640px;
      margin: 0 auto;
      padding-bottom: 110px;
    }

    /* ===== HEADER ===== */
    header {
      background: var(--surface);
      padding: 20px 16px 14px;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border);
      box-shadow: 0 2px 20px rgba(0,0,0,.4);
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .header-top h1 {
      font-size: 22px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent-lt), #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      flex: 1;
    }

    .header-icon { font-size: 28px; line-height: 1; }

    /* ===== STATS ===== */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .stat {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 8px 6px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s;
    }

    .stat:hover { border-color: var(--accent); }

    .stat-num {
      display: block;
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
    }

    .stat-lbl {
      display: block;
      font-size: 10px;
      color: var(--text2);
      margin-top: 3px;
      white-space: nowrap;
    }

    .stat.all  .stat-num { color: var(--accent-lt); }
    .stat.reading .stat-num { color: var(--reading); }
    .stat.read    .stat-num { color: var(--read); }
    .stat.want    .stat-num { color: var(--want); }

    /* ===== SEARCH BAR ===== */
    .search-wrap {
      padding: 10px 16px 0;
    }

    .search-inner {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-inner svg.ico {
      position: absolute;
      left: 13px;
      color: var(--text2);
      pointer-events: none;
      flex-shrink: 0;
    }

    .search-inner input {
      width: 100%;
      padding: 11px 40px 11px 42px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 50px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color .2s;
    }

    .search-inner input:focus { border-color: var(--accent); }
    .search-inner input::placeholder { color: var(--text2); }

    .search-clear {
      position: absolute;
      right: 12px;
      background: var(--surface3);
      border: none;
      color: var(--text2);
      width: 22px;
      height: 22px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 12px;
      display: none;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .search-clear.show { display: flex; }

    /* ===== TABS ===== */
    .tabs {
      display: flex;
      gap: 6px;
      padding: 10px 16px 0;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      flex-shrink: 0;
      padding: 7px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: none;
      color: var(--text2);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
    }

    .tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 700;
      box-shadow: 0 2px 12px var(--accent-glow);
    }

    /* ===== BOOKS GRID ===== */
    .books-section { padding: 12px 16px 0; }

    .books-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    @media (min-width: 460px) { .books-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 600px) { .books-grid { grid-template-columns: repeat(4, 1fr); } }

    /* ===== BOOK CARD ===== */
    .book-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      cursor: pointer;
      position: relative;
      transition: transform .18s, box-shadow .18s;
    }

    .book-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
    }

    .book-card:active { transform: scale(.97); }

    .cover-wrap {
      width: 100%;
      aspect-ratio: 2/3;
      position: relative;
      overflow: hidden;
      background: var(--surface2);
    }

    .book-cover {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .cover-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      background: linear-gradient(145deg, var(--surface2), var(--surface3));
    }

    .book-info { padding: 9px 10px 10px; }

    .book-title {
      font-size: 12px;
      font-weight: 700;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 3px;
    }

    .book-author {
      font-size: 11px;
      color: var(--text2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 7px;
    }

    .book-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
    }

    .badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 10px;
      white-space: nowrap;
    }

    .badge.reading { background: rgba(245,158,11,.18); color: var(--reading); }
    .badge.read    { background: rgba(16,185,129,.18); color: var(--read); }
    .badge.want    { background: rgba(59,130,246,.18);  color: var(--want); }

    .stars-small { font-size: 11px; color: var(--star); letter-spacing: -1px; }

    /* Card actions (hover/long-press) */
    .card-actions {
      position: absolute;
      top: 7px;
      right: 7px;
      display: flex;
      gap: 5px;
      opacity: 0;
      transition: opacity .2s;
    }

    .book-card:hover .card-actions,
    .book-card.actions-visible .card-actions { opacity: 1; }

    .ca-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
    }

    .ca-edit   { background: rgba(124,106,247,.85); color: #fff; }
    .ca-delete { background: rgba(239,68,68,.85);   color: #fff; }

    /* ===== EMPTY STATE ===== */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 56px 20px;
      color: var(--text2);
    }

    .empty .e-ico { font-size: 64px; margin-bottom: 16px; }
    .empty h3 { font-size: 18px; color: var(--text); margin-bottom: 8px; }
    .empty p { font-size: 14px; }

    /* ===== LOADING ===== */
    .loading {
      grid-column: 1 / -1;
      text-align: center;
      padding: 56px 20px;
      color: var(--text2);
    }

    /* ===== FAB ===== */
    .fab-wrap {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 200;
    }

    @media (min-width: 640px) {
      .fab-wrap {
        left: auto;
        right: calc((100vw - 640px) / 2 + 16px);
        transform: none;
      }
    }

    .fab {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 22px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 28px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 20px var(--accent-glow);
      transition: transform .15s, box-shadow .15s;
      white-space: nowrap;
    }

    .fab:active { transform: scale(.95); }

    .fab-cam {
      padding: 14px 16px;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      font-size: 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,.3);
    }

    /* ===== SPINNER ===== */
    .spin {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .65s linear infinite;
      vertical-align: middle;
    }

    .spin-accent {
      border-color: rgba(124,106,247,.25);
      border-top-color: var(--accent);
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== MODAL ===== */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(4px);
      z-index: 300;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }

    .overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      width: 100%;
      max-width: 640px;
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      border: 1px solid var(--border);
      border-bottom: none;
      max-height: 92dvh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.32,1,.56,1);
      overscroll-behavior: contain;
    }

    .overlay.open .modal { transform: translateY(0); }

    .modal-handle {
      width: 40px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 12px auto 0;
    }

    .modal-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 10;
    }

    .modal-title { font-size: 17px; font-weight: 800; }

    .modal-x {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-body { padding: 18px 20px 30px; }

    /* ===== FORM ===== */
    .fg { margin-bottom: 16px; }

    .fl {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--text2);
      margin-bottom: 7px;
    }

    .fi, .fs, .fta {
      width: 100%;
      padding: 11px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color .2s;
    }

    .fi:focus, .fs:focus, .fta:focus { border-color: var(--accent); }
    .fi::placeholder, .fta::placeholder { color: var(--text2); }
    .fs option { background: var(--surface2); }

    .fta {
      min-height: 80px;
      resize: vertical;
      font-family: inherit;
      line-height: 1.5;
    }

    /* Status buttons */
    .status-btns {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .sbtn {
      padding: 10px 6px;
      border-radius: var(--r-sm);
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all .18s;
      text-align: center;
    }

    .sbtn.on.reading { background: rgba(245,158,11,.18); border-color: var(--reading); color: var(--reading); }
    .sbtn.on.read    { background: rgba(16,185,129,.18); border-color: var(--read);    color: var(--read); }
    .sbtn.on.want    { background: rgba(59,130,246,.18); border-color: var(--want);    color: var(--want); }

    /* Stars */
    .star-row { display: flex; gap: 6px; }

    .star {
      font-size: 32px;
      background: none;
      border: none;
      color: var(--border);
      cursor: pointer;
      padding: 0;
      line-height: 1;
      transition: color .1s, transform .1s;
    }

    .star.on { color: var(--star); }
    .star:hover { transform: scale(1.2); }

    /* Cover preview row */
    .cover-prev {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      margin-bottom: 16px;
    }

    .cover-prev img {
      width: 54px; height: 80px;
      object-fit: cover;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .cover-prev-info { flex: 1; min-width: 0; }

    .cpi-title {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cpi-author { font-size: 12px; color: var(--text2); }

    .cover-prev-x {
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      flex-shrink: 0;
    }

    /* Google search in modal */
    .gsearch-wrap { margin-bottom: 14px; }

    .gsearch-lbl {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--text2);
      margin-bottom: 8px;
      display: block;
    }

    .gsearch-row { display: flex; gap: 8px; }

    .gsearch-input {
      flex: 1;
      padding: 10px 13px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }

    .gsearch-input:focus { border-color: var(--accent); }
    .gsearch-input::placeholder { color: var(--text2); }

    /* Buttons */
    .btn {
      padding: 11px 16px;
      border-radius: var(--r-sm);
      border: none;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      justify-content: center;
    }

    .btn:active { opacity: .75; transform: scale(.97); }
    .btn-accent   { background: var(--accent); color: #fff; }
    .btn-surface  { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-danger   { background: var(--danger); color: #fff; }
    .btn-full     { width: 100%; padding: 14px; font-size: 16px; }

    /* Search results */
    .results {
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      overflow: hidden;
      max-height: 300px;
      overflow-y: auto;
    }

    .r-item {
      display: flex;
      gap: 12px;
      padding: 10px 12px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background .15s;
    }

    .r-item:last-child { border-bottom: none; }
    .r-item:hover { background: var(--surface2); }

    .r-cover {
      width: 38px; height: 56px;
      object-fit: cover;
      border-radius: 3px;
      flex-shrink: 0;
      background: var(--surface3);
    }

    .r-cover-ph {
      width: 38px; height: 56px;
      border-radius: 3px;
      flex-shrink: 0;
      background: var(--surface3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .r-info { flex: 1; min-width: 0; }

    .r-title {
      font-size: 13px;
      font-weight: 700;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 3px;
    }

    .r-author { font-size: 12px; color: var(--text2); }
    .r-isbn { font-size: 11px; color: var(--text2); margin-top: 2px; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 14px 0;
      color: var(--text2);
      font-size: 12px;
      font-weight: 600;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Camera modal */
    .cam-wrap {
      position: relative;
      background: #000;
      border-radius: var(--r-sm);
      overflow: hidden;
      aspect-ratio: 4/3;
      margin-bottom: 14px;
    }

    #camVideo {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    .cam-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .cam-frame {
      width: 220px; height: 110px;
      border: 2px solid rgba(124,106,247,.9);
      border-radius: 6px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,.45);
    }

    .cam-hint {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 12px;
      background: rgba(0,0,0,.65);
      padding: 5px 12px;
      border-radius: 20px;
      white-space: nowrap;
      backdrop-filter: blur(4px);
    }

    .cam-no-support {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text2);
      font-size: 13px;
      flex-direction: column;
      gap: 10px;
      padding: 20px;
      text-align: center;
    }

    .file-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 12px 14px;
      background: var(--surface2);
      border: 1px dashed var(--border);
      border-radius: var(--r-sm);
      color: var(--text2);
      font-size: 14px;
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }

    .file-btn:hover { border-color: var(--accent); color: var(--text); }

    /* ===== TOAST ===== */
    #toasts {
      position: fixed;
      bottom: 110px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      pointer-events: none;
    }

    .toast {
      padding: 11px 20px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      max-width: 320px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,.4);
      animation: toast-in .25s ease;
    }

    .toast.success { background: var(--read); color: #fff; }
    .toast.error   { background: var(--danger); color: #fff; }
    .toast.info    { background: var(--accent); color: #fff; }

    @keyframes toast-in {
      from { opacity: 0; transform: translateY(8px) scale(.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<div id="offlineBanner">⚠ Tryb offline — brak połączenia z internetem</div>

<div id="app">
  <header>
    <div class="header-top">
      <span class="header-icon">📚</span>
      <h1>Moja Biblioteka</h1>
    </div>
    <div class="stats">
      <div class="stat all"    data-filter="all">
        <span class="stat-num" id="sAll">0</span>
        <span class="stat-lbl">Wszystkie</span>
      </div>

<script>
'use strict';

/* ============================================================
   CONFIG
============================================================ */
const SB_URL  = 'https://dwiltyowswjdgiwjrseg.supabase.co';
const SB_KEY  = 'sb_publishable_474EX7-21bh7uD-a4YsrNA_iJQTpRZW';
const SB_HDR  = {
  'apikey':        SB_KEY,
  'Authorization': `Bearer ${SB_KEY}`,
  'Content-Type':  'application/json',
  'Prefer':        'return=representation'
};

/* ============================================================
   STATE
============================================================ */
let books       = [];
let filter      = 'all';
let query       = '';
let rating      = 0;
let status      = 'want';
let editId      = null;
let camStream   = null;
let zxingReader = null;

/* ============================================================
   SUPABASE HELPERS
============================================================ */
async function sbFetch(path, opts = {}) {
  const res = await fetch(`${SB_URL}/rest/v1${path}`, {
    ...opts,
    headers: { ...SB_HDR, ...(opts.headers || {}) }
  });
  if (!res.ok) throw new Error(`${res.status}: ${await res.text()}`);
  return res.status === 204 ? null : res.json();
}

const loadBooks = async () => {
  try {
    const data = await sbFetch('/books?select=*&order=added_at.desc');
    books = Array.isArray(data) ? data : [];
  } catch (e) {
    console.error(e);
    toast('Błąd połączenia z bazą danych', 'error');
    books = books.length ? books : [];
  }
  renderGrid();
  renderStats();
};

const upsertBook = async (payload) => {
  if (editId) {
    await sbFetch(`/books?id=eq.${editId}`, {
      method: 'PATCH', body: JSON.stringify(payload)
    });
  } else {
    payload.added_at = new Date().toISOString();
    await sbFetch('/books', { method: 'POST', body: JSON.stringify(payload) });
  }
};

const removeBook = async (id) => {
  await sbFetch(`/books?id=eq.${id}`, { method: 'DELETE' });
};

/* ============================================================
   GOOGLE BOOKS
============================================================ */
async function gBooks(q) {
  const r = await fetch(
    `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(q)}&maxResults=10`
  );
  const d = await r.json();
  return d.items || [];
}

function parseBook(item) {
  const v = item.volumeInfo || {};
  const il = v.imageLinks || {};
  const cover = (il.thumbnail || il.smallThumbnail || '').replace('http:', 'https:');
  const idents = v.industryIdentifiers || [];
  const isbn = (idents.find(i => i.type === 'ISBN_13') || idents.find(i => i.type === 'ISBN_10') || {}).identifier || '';
  return {
    title:     v.title || '',
    author:    (v.authors || []).join(', '),
    genre:     (v.categories || [])[0] || '',
    isbn,
    cover_url: cover
  };
}

/* ============================================================
   RENDER GRID
============================================================ */
const statusLabel = { reading: 'Czytam', read: 'Przeczytana', want: 'Chcę' };

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const filtered = books.filter(b => {
    if (filter !== 'all' && b.status !== filter) return false;
    if (query) {
      const q = query.toLowerCase();
      return (b.title  || '').toLowerCase().includes(q) ||
             (b.author || '').toLowerCase().includes(q);
    }
    return true;
  });

  if (!filtered.length) {
    grid.innerHTML = `
      <div class="empty">
        <div class="e-ico">${books.length ? '🔍' : '📭'}</div>
        <h3>${books.length ? 'Brak wyników' : 'Biblioteka jest pusta'}</h3>
        <p>${books.length ? 'Zmień filtry lub wyszukiwanie' : 'Dodaj swoją pierwszą książkę!'}</p>
      </div>`;
    return;
  }

  grid.innerHTML = filtered.map(b => `
    <div class="book-card" data-id="${b.id}">
      <div class="cover-wrap">
        ${b.cover_url
          ? `<img class="book-cover" src="${esc(b.cover_url)}" alt="${esc(b.title)}" loading="lazy"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          : ''}
        <div class="cover-placeholder" ${b.cover_url ? 'style="display:none"' : ''}>📚</div>
      </div>
      <div class="book-info">
        <div class="book-title">${esc(b.title)}</div>
        <div class="book-author">${esc(b.author || '—')}</div>
        <div class="book-footer">
          <span class="badge ${b.status}">${statusLabel[b.status] || b.status}</span>
          ${b.rating ? `<span class="stars-small">${'★'.repeat(b.rating)}</span>` : ''}
        </div>
      </div>
      <div class="card-actions">
        <button class="ca-btn ca-edit"   data-act="edit"   title="Edytuj">✎</button>
        <button class="ca-btn ca-delete" data-act="delete" title="Usuń">✕</button>
      </div>
    </div>
  `).join('');

  grid.querySelectorAll('.book-card').forEach(card => {
    // Long press → show action buttons on mobile
    let timer;
    card.addEventListener('touchstart', () => {
      timer = setTimeout(() => card.classList.add('actions-visible'), 500);
    }, { passive: true });
    card.addEventListener('touchend',  () => clearTimeout(timer));
    card.addEventListener('touchmove', () => clearTimeout(timer), { passive: true });

    card.addEventListener('click', e => {
      const act = e.target.closest('[data-act]')?.dataset.act;
      const id  = +card.dataset.id;
      const bk  = books.find(b => b.id === id);
      if (act === 'delete') { confirmDelete(id, bk?.title); return; }
      openEdit(bk);
    });
  });
}

function renderStats() {
  document.getElementById('sAll').textContent     = books.length;
  document.getElementById('sReading').textContent = books.filter(b => b.status === 'reading').length;
  document.getElementById('sRead').textContent    = books.filter(b => b.status === 'read').length;
  document.getElementById('sWant').textContent    = books.filter(b => b.status === 'want').length;
}

/* ============================================================
   SEARCH + TABS
============================================================ */
document.getElementById('searchIn').addEventListener('input', e => {
  query = e.target.value;
  document.getElementById('searchClear').classList.toggle('show', !!query);
  renderGrid();
});

document.getElementById('searchClear').addEventListener('click', () => {
  document.getElementById('searchIn').value = '';
  query = '';
  document.getElementById('searchClear').classList.remove('show');
  renderGrid();
});

document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  filter = tab.dataset.filter;
  renderGrid();
});

// Stats chips also act as tab shortcuts
document.querySelectorAll('.stat[data-filter]').forEach(chip => {
  chip.addEventListener('click', () => {
    const f = chip.dataset.filter;
    document.querySelectorAll('.tab').forEach(t => {
      t.classList.toggle('active', t.dataset.filter === f);
    });
    filter = f;
    renderGrid();
  });
});

/* ============================================================
   MODAL HELPERS
============================================================ */
function openOverlay(id) {
  document.getElementById(id).classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeOverlay(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}

document.querySelectorAll('.overlay').forEach(o => {
  o.addEventListener('click', e => {
    if (e.target === o) {
      if (o.id === 'camOverlay') stopCam();
      closeOverlay(o.id);
    }
  });
});

/* ============================================================
   BOOK MODAL — open / reset
============================================================ */
function openAdd() {
  editId = null;
  resetBookForm();
  document.getElementById('bookModalTitle').textContent = 'Dodaj książkę';
  document.getElementById('deleteBtn').style.display    = 'none';
  openOverlay('bookOverlay');
}

function openEdit(bk) {
  if (!bk) return;
  editId = bk.id;
  document.getElementById('bookModalTitle').textContent = 'Edytuj książkę';
  document.getElementById('deleteBtn').style.display    = 'block';

  document.getElementById('fTitle').value  = bk.title  || '';
  document.getElementById('fAuthor').value = bk.author || '';
  document.getElementById('fGenre').value  = bk.genre  || '';
  document.getElementById('fNotes').value  = bk.notes  || '';
  document.getElementById('fIsbn').value   = bk.isbn   || '';
  document.getElementById('fCoverUrl').value = bk.cover_url || '';

  setStatus(bk.status || 'want');
  setRating(bk.rating || 0);

  if (bk.cover_url) showCoverPreview(bk.cover_url, bk.title, bk.author);
  else hideCoverPreview();

  document.getElementById('gSearchIn').value = '';
  document.getElementById('gResults').innerHTML = '';

  openOverlay('bookOverlay');
}

function resetBookForm() {
  document.getElementById('bookForm').reset();
  document.getElementById('fCoverUrl').value = '';
  document.getElementById('fIsbn').value     = '';
  document.getElementById('fEditId').value   = '';
  document.getElementById('gSearchIn').value = '';
  document.getElementById('gResults').innerHTML = '';
  setStatus('want');
  setRating(0);
  hideCoverPreview();
}

document.getElementById('fabAdd').addEventListener('click', openAdd);
document.getElementById('bookModalClose').addEventListener('click', () => closeOverlay('bookOverlay'));

/* ============================================================
   STATUS + RATING
============================================================ */
function setStatus(s) {
  status = s;
  document.querySelectorAll('.sbtn').forEach(b => {
    b.classList.toggle('on', b.dataset.s === s);
  });
}

function setRating(r) {
  rating = r;
  document.querySelectorAll('.star').forEach(s => {
    s.classList.toggle('on', +s.dataset.v <= r);
  });
}

document.querySelectorAll('.sbtn').forEach(b =>
  b.addEventListener('click', () => setStatus(b.dataset.s))
);

document.getElementById('starRow').addEventListener('click', e => {
  const s = e.target.closest('.star');
  if (!s) return;
  const v = +s.dataset.v;
  setRating(rating === v ? 0 : v); // click same star = clear
});

/* ============================================================
   COVER PREVIEW
============================================================ */
function showCoverPreview(url, title, author) {
  document.getElementById('prevImg').src     = url;
  document.getElementById('prevTitle').textContent  = title || '';
  document.getElementById('prevAuthor').textContent = author || '';
  document.getElementById('coverPrev').style.display = 'flex';
}

function hideCoverPreview() {
  document.getElementById('coverPrev').style.display = 'none';
  document.getElementById('prevImg').src = '';
}

document.getElementById('clearCoverBtn').addEventListener('click', () => {
  document.getElementById('fCoverUrl').value = '';
  hideCoverPreview();
});

/* ============================================================
   GOOGLE SEARCH (in book modal)
============================================================ */
async function doGSearch(q, resultsEl, onPick) {
  if (!q.trim()) return;
  resultsEl.innerHTML = `<div style="text-align:center;padding:20px">
    <div class="spin spin-accent" style="width:26px;height:26px;margin:auto"></div>
  </div>`;
  try {
    const items = await gBooks(q);
    if (!items.length) {
      resultsEl.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text2);font-size:13px">Brak wyników — spróbuj innego zapytania</div>';
      return;
    }
    resultsEl.innerHTML = `<div class="results">${items.map((item, i) => {
      const b = parseBook(item);
      return `
        <div class="r-item" data-idx="${i}">
          ${b.cover_url
            ? `<img class="r-cover" src="${esc(b.cover_url)}" alt="" loading="lazy">`
            : `<div class="r-cover-ph">📚</div>`}
          <div class="r-info">
            <div class="r-title">${esc(b.title)}</div>
            <div class="r-author">${esc(b.author)}</div>
            ${b.isbn ? `<div class="r-isbn">ISBN: ${esc(b.isbn)}</div>` : ''}
          </div>
        </div>`;
    }).join('')}</div>`;

    resultsEl.querySelectorAll('.r-item').forEach(el => {
      el.addEventListener('click', () => {
        onPick(parseBook(items[+el.dataset.idx]));
        resultsEl.innerHTML = '';
      });
    });
  } catch (e) {
    resultsEl.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text2);font-size:13px">Błąd wyszukiwania — sprawdź połączenie</div>';
  }
}

function applyGBook(bk) {
  if (bk.title)     document.getElementById('fTitle').value  = bk.title;
  if (bk.author)    document.getElementById('fAuthor').value = bk.author;
  if (bk.genre) {
    const sel = document.getElementById('fGenre');
    for (const opt of sel.options) {
      if (opt.value.toLowerCase() === bk.genre.toLowerCase()) {
        sel.value = opt.value; break;
      }
    }
  }
  if (bk.isbn)      document.getElementById('fIsbn').value     = bk.isbn;
  if (bk.cover_url) {
    document.getElementById('fCoverUrl').value = bk.cover_url;
    showCoverPreview(bk.cover_url, bk.title, bk.author);
  }
}

document.getElementById('gSearchBtn').addEventListener('click', () => {
  doGSearch(
    document.getElementById('gSearchIn').value,
    document.getElementById('gResults'),
    bk => applyGBook(bk)
  );
});

document.getElementById('gSearchIn').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('gSearchBtn').click();
});

/* ============================================================
   FORM SUBMIT
============================================================ */
document.getElementById('bookForm').addEventListener('submit', async e => {
  e.preventDefault();
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { toast('Podaj tytuł książki', 'error'); return; }

  const payload = {
    title,
    author:    document.getElementById('fAuthor').value.trim()   || null,
    genre:     document.getElementById('fGenre').value           || null,
    status,
    rating:    rating || null,
    notes:     document.getElementById('fNotes').value.trim()    || null,
    cover_url: document.getElementById('fCoverUrl').value        || null,
    isbn:      document.getElementById('fIsbn').value            || null,
  };

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Zapisywanie…';

  try {
    await upsertBook(payload);
    toast(editId ? 'Książka zaktualizowana!' : 'Książka dodana!', 'success');
    closeOverlay('bookOverlay');
    await loadBooks();
  } catch (err) {
    toast('Błąd zapisu: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Zapisz książkę';
  }
});

/* ============================================================
   DELETE
============================================================ */
async function confirmDelete(id, title) {
  if (!confirm(`Usunąć "${title || 'tę książkę'}"?`)) return;
  try {
    await removeBook(id);
    toast('Książka usunięta', 'info');
    closeOverlay('bookOverlay');
    await loadBooks();
  } catch {
    toast('Błąd usuwania', 'error');
  }
}

document.getElementById('deleteBtn').addEventListener('click', () => {
  const bk = books.find(b => b.id === editId);
  confirmDelete(editId, bk?.title);
});

/* ============================================================
   CAMERA MODAL
============================================================ */
document.getElementById('fabCam').addEventListener('click', openCamModal);
document.getElementById('camModalClose').addEventListener('click', () => {
  stopCam();
  closeOverlay('camOverlay');
});

async function openCamModal() {
  document.getElementById('camSearchIn').value = '';
  document.getElementById('camResults').innerHTML = '';
  openOverlay('camOverlay');
  await startCam();
}

async function startCam() {
  const hint = document.getElementById('camHint');

  // Czekaj aż ZXing załaduje się z CDN (maks. 3 s)
  let attempts = 0;
  while (!window.ZXingBrowser && attempts < 30) {
    await new Promise(r => setTimeout(r, 100));
    attempts++;
  }
  if (!window.ZXingBrowser) {
    hint.textContent = 'Skaner niedostępny — użyj pola tekstowego lub wgraj zdjęcie';
    console.error('startCam: ZXing not loaded');
    return;
  }

  try {
    zxingReader = new ZXingBrowser.BrowserMultiFormatReader();
    hint.textContent = 'Nakieruj kamerę na kod kreskowy ISBN';

    await zxingReader.decodeFromConstraints(
      { video: { facingMode: 'environment', width: { ideal: 1280 } } },
      document.getElementById('camVideo'),
      (result, err, controls) => {
        if (result) {
          const isbn = result.getText();
          controls.stop();
          camStream = null;
          closeOverlay('camOverlay');
          openAdd();
          document.getElementById('gSearchIn').value = isbn;
          document.getElementById('gSearchBtn').click();
          toast(`Wykryto: ${isbn}`, 'info');
        }
      }
    );

    // Zachowaj referencję do streamu żeby stopCam() mógł go zatrzymać
    const vid = document.getElementById('camVideo');
    if (vid && vid.srcObject) camStream = vid.srcObject;

  } catch (e) {
    hint.textContent = 'Brak dostępu do kamery — użyj pola tekstowego';
    document.getElementById('camVideo').style.display = 'none';
    console.error('startCam:', e);
  }
}

function stopCam() {
  if (zxingReader) {
    try { zxingReader.reset(); } catch {}
    zxingReader = null;
  }
  if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  const vid = document.getElementById('camVideo');
  if (vid) vid.srcObject = null;
}

/* ============================================================
   CAMERA FILE INPUT (photo / gallery)
============================================================ */
document.getElementById('camFileIn').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';

  try {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.src = url;
    await new Promise((res, rej) => { img.onload = res; img.onerror = rej; });

    const reader = new ZXingBrowser.BrowserMultiFormatReader();
    const result = await reader.decodeFromImageElement(img);
    URL.revokeObjectURL(url);

    const isbn = result.getText();
    stopCam();
    closeOverlay('camOverlay');
    openAdd();
    document.getElementById('gSearchIn').value = isbn;
    document.getElementById('gSearchBtn').click();
    toast(`Wykryto ISBN: ${isbn}`, 'info');
  } catch {
    toast('Nie wykryto kodu — wpisz tytuł lub ISBN ręcznie', 'info');
  }
});

/* ============================================================
   CAMERA MODAL SEARCH
============================================================ */
document.getElementById('camSearchBtn').addEventListener('click', () => {
  doGSearch(
    document.getElementById('camSearchIn').value,
    document.getElementById('camResults'),
    bk => {
      stopCam();
      closeOverlay('camOverlay');
      openAdd();
      applyGBook(bk);
    }
  );
});

document.getElementById('camSearchIn').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('camSearchBtn').click();
});

/* ============================================================
   TOAST
============================================================ */
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

/* ============================================================
   OFFLINE
============================================================ */
const banner = document.getElementById('offlineBanner');
window.addEventListener('online',  () => { banner.classList.remove('show'); loadBooks(); });
window.addEventListener('offline', () => banner.classList.add('show'));
if (!navigator.onLine) banner.classList.add('show');

/* ============================================================
   SERVICE WORKER
============================================================ */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js')
    .catch(err => console.warn('SW:', err));
}

/* ============================================================
   INIT
============================================================ */
loadBooks();
</script>
</body>
</html>
